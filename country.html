    const email = document.getElementById('user-email').value;
    const pw = document.getElementById('user-pw').value;

    if (!email || !pw) {
        alert("독자 동무! 아이디랑 비번은 치고 들어와야지? ㅋㅋㅋ");
        return;
    }

    try {
        // 1. 일단 회원가입을 시도한다우!
        await auth.createUserWithEmailAndPassword(email, pw);
        alert("반갑다우! 새로운 관리자 계정이 생성됐다우! 🍾");
    } catch (error) {
        // 2. 이미 있는 계정(email-already-in-use)이라면? 바로 로그인을 시도한다우!
        if (error.code === 'auth/email-already-in-use') {
            try {
                await auth.signInWithEmailAndPassword(email, pw);
                alert("다시 와줘서 고맙다우! 로그인 성공이라우! ㅋㅋㅋ");
            } catch (loginError) {
                alert("비번이 틀린 것 같다우! 다시 생각해보라 기래! ❌");
                return;
            }
        } else {
            // 다른 에러(비번 너무 짧음 등) 처리
            alert("에러 발생이라우!: " + error.message);
            return;
        }
    }

    // 3. 인증 성공 시 화면 전환 및 시스템 가동
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('viewer').style.display = 'block';
    initSystem();
}

    // 4. 시스템 초기화 및 데이터 로드
    function initSystem() {
        const btnBox = document.getElementById('nation-buttons');
        const detailBox = document.getElementById('detail-container');

        nations.forEach(n => {
            // 버튼 생성
            const btn = document.createElement('button');
            btn.className = 'tab-btn'; btn.id = `btn-${n}`;
            btn.innerText = `📄 ${n}`; btn.onclick = () => openTab(n);
            btnBox.appendChild(btn);

            // 페이지 생성
            const data = contents[n] || { reason: "자원 확보...", plan: "기술 개발...", status: "대기", promise: "공약..." };
            const page = document.createElement('div');
            page.id = n; page.className = 'doc-page';
            page.innerHTML = `
                <h1>신청서 제출</h1>
                <div class="field"><span class="label">국가명</span><div class="content">${n}</div></div>
                <div class="field"><span class="label">필요 이유</span><div class="content">${data.reason}</div></div>
                <div class="field"><span class="label">활용 계획</span><div class="content">${data.plan}</div></div>
                <div class="field"><span class="label">공약</span><div class="content">${data.promise}</div></div>
                <div class="field">
                    <span class="label">부제목5: 통과 여부 (직접 선택)</span>
                    <select id="select-${n}" class="decision-select" onchange="saveToDB('${n}', this.value)">
                        <option value="pending">⏳ 검토 중...</option>
                        <option value="pass" style="color:green;">✅ 합격 (최공식 수교)</option>
                        <option value="fail" style="color:red;">❌ 탈락 (영구 제명)</option>
                        <option value="slave" style="color: #ef6c00;">⛏️ 조건부 합격 (자원 채굴 노예군)</option>
                        <option value="test" style="color: #4527a0;">🧪 임상 시험국 (아스프로탄트 실험용)</option>
                        <option value="ignore" style="color: #78909c;">💤 읽씹 (대답할 가치도 없음)</option>
                        <option value="re-apply" style="color: #fdd835;">♻️ 재수강 (장문 다시 써와라)</option>
                    </select>
                </div>
            `;
            detailBox.appendChild(page);

            // 실시간 데이터 동기화
            db.ref('decisions/' + n).on('value', (snapshot) => {
                const val = snapshot.val();
                if(val) document.getElementById(`select-${n}`).value = val;
            });
        });
    }

    function saveToDB(nation, value) {
        db.ref('decisions/' + nation).set(value);
        console.log(`${nation} 저장 완료!`);
    }

    function openTab(id) {
        document.querySelectorAll('.doc-page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById(`btn-${id}`).classList.add('active');
    }
</script>
</body>
</html>
